name: CI

# Runs on every push and PR (Doc 02 §9's "typecheck, lint, unit + integration tests" gate) — the
# fast feedback loop for everyday development, independent of the deploy pipeline in deploy.yml.
on:
  push:
    branches-ignore: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      # Must run before the test step: apps/worker's wrangler.toml declares an [assets]
      # binding pointing at ../web/dist, and @cloudflare/vitest-pool-workers refuses to start
      # (even for tests unrelated to static assets) if that directory doesn't exist yet.
      - name: Build SPA
        run: pnpm --filter @kokoro/web run build

      # apps/worker's own `pretest` script seeds .dev.vars from the committed .dev.vars.example
      # (fixed, non-secret placeholder values) if it's missing — handles CI having none, since
      # the real file is gitignored dev-only config (KOK-007).
      - name: Unit + integration tests
        run: pnpm run test
