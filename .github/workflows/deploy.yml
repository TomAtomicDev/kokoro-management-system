name: Deploy

# Doc 02 §9: main branch -> checks -> build SPA -> migrate + deploy staging -> Playwright smoke
# -> manual approval (production GitHub Environment's required reviewer) -> migrate + deploy
# prod. Migrations always run before the Worker version switch in the same job (expand ->
# migrate -> contract policy) — see docs/system-design-knowledge-base/02-system-architecture.md §9.
#
# Rollback: `wrangler rollback --env <staging|prod>` reverts the Worker to its previous deployed
# version (near-instant, no rebuild). D1 has no automated rollback — migrations are forward-fix
# only (Doc 02 §9); see the runbook in .github/workflows/README.md.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false # never cancel a deploy mid-flight

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      # Must precede the test step — see the matching comment in ci.yml.
      - run: pnpm --filter @kokoro/web run build
      - run: pnpm run test

  deploy-staging:
    name: Deploy to staging
    needs: check
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      staging_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build SPA
        run: pnpm --filter @kokoro/web run build

      - name: Apply D1 migrations (staging)
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply kokoro-staging --remote --env staging

      - name: Deploy Worker (staging)
        id: deploy
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler deploy --env staging | tee deploy-output.txt
          url=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy-output.txt | head -1)
          if [ -z "$url" ]; then
            echo "::error::Could not find the deployed Worker URL in wrangler's output"
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

  smoke-staging:
    name: Playwright smoke test (staging)
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke suite against staging
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-staging.outputs.staging_url }}
          # Optional (Doc 11 §6 "login works" gate) — set the STAGING_OWNER_PASSWORD secret to
          # enable the login smoke check; the test skips itself gracefully if unset.
          E2E_LOGIN_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}
        run: pnpm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  deploy-prod:
    name: Deploy to production
    needs: smoke-staging
    runs-on: ubuntu-latest
    # This environment has a required reviewer configured in GitHub (repo Settings ->
    # Environments -> production) — the job pauses here for manual approval (Doc 02 §9).
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build SPA
        run: pnpm --filter @kokoro/web run build

      - name: Apply D1 migrations (prod)
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply kokoro-prod --remote --env prod

      - name: Deploy Worker (prod)
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --env prod
